services:
  redis:
    image: redis:7-alpine
    container_name: lais-redis
    command: ["redis-server", "--save", "60", "1", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - lais-network
    restart: unless-stopped

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: lais-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pass}
      POSTGRES_DB: ${POSTGRES_DB:-lais_marketplace}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - lais-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Auth Service (Аутентификация и управление пользователями)
  auth-service:
    build:
      context: ./auth
      dockerfile: Dockerfile
    container_name: lais-auth
    environment:
      - USE_POSTGRES=true
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-pass}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-lais_marketplace}
      - POSTGRES_SCHEMA=posts_db
      - PORT=${AUTH_PORT:-8000}
      - BACKEND_HOST=${BACKEND_HOST:-0.0.0.0}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:8080}
      - REDIS_URL=redis://redis:6379/0
      - REDIS_RESULT_URL=redis://redis:6379/1
      - SECRET_KEY=${SECRET_KEY:-My secret key}
      - TOKEN_ALGORITHM=${TOKEN_ALGORITHM:-HS256}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      - SESSION_SECRET=${SESSION_SECRET:-ANY_RANDOM_STRING_FOR_SESSION}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - PUBLIC_DOMAIN=${PUBLIC_DOMAIN:-https://test.yuniversia.eu}
      - COOKIE_SECURE=${COOKIE_SECURE:-true}
      - AUTH_SERVICE_URL=${AUTH_SERVICE_URL:-http://localhost:8000}
    ports:
      - "${AUTH_PORT:-8000}:${AUTH_PORT:-8000}"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - lais-network
    restart: unless-stopped
    volumes:
      - ./auth:/app
      - /app/auth  # Исключаем виртуальное окружение

  # Posts Service (Управление объявлениями и покупками)
  posts-service:
    build:
      context: ./posts
      dockerfile: Dockerfile
    container_name: lais-posts
    environment:
      - USE_POSTGRES=true
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-pass}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-lais_marketplace}
      - POSTGRES_SCHEMA=posts_db
      - PORT=${POSTS_PORT:-3000}
      - BACKEND_HOST=${BACKEND_HOST:-0.0.0.0}
      - SECRET_KEY=${SECRET_KEY:-My secret key}
      - TOKEN_ALGORITHM=${TOKEN_ALGORITHM:-HS256}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      - CF_ACCOUNT_ID=${CF_ACCOUNT_ID}
      - CF_ACCOUNT_HASH=${CF_ACCOUNT_HASH}
      - CF_R2_ACCESS_KEY_ID=${CF_R2_ACCESS_KEY_ID}
      - CF_R2_SECRET_ACCESS_KEY=${CF_R2_SECRET_ACCESS_KEY}
      - CF_API_TOKEN=${CF_API_TOKEN}
      - CF_IMAGE_DELIVERY_URL=${CF_IMAGE_DELIVERY_URL:-https://imagedelivery.net}
      - POST_CF_R2_HASH=${POST_CF_R2_HASH}
      - POST_CF_R2_BUCKET_NAME=${POST_CF_R2_BUCKET_NAME}
      - POST_CF_R2_ACCESS_KEY_ID=${POST_CF_R2_ACCESS_KEY_ID}
      - POST_CF_R2_SECRET_ACCESS_KEY=${POST_CF_R2_SECRET_ACCESS_KEY}
      - USE_TEST_MODE=${USE_TEST_MODE:-false}
      - NOTIFICATION_SERVICE_URL=http://notifications-service:6000
      - DELIVERY_SERVICE_URL=http://delivery-service:7000
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:8080}
      - IMEI_CHECKER_SERVICE_URL=http://imei-checker-service:${IMEI_PORT:-5002}
    ports:
      - "${POSTS_PORT:-3000}:${POSTS_PORT:-3000}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      auth-service:
        condition: service_started
      notifications-service:
        condition: service_started
    networks:
      - lais-network
    restart: unless-stopped
    volumes:
      - ./posts:/app
      - /app/posts  # Исключаем виртуальное окружение

  posts-worker:
    build:
      context: ./posts
      dockerfile: Dockerfile
    container_name: lais-posts-worker
    command: ["taskiq", "worker", "tasks:broker", "tasks"]
    environment:
      - USE_POSTGRES=true
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-pass}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-lais_marketplace}
      - CF_ACCOUNT_ID=${CF_ACCOUNT_ID}
      - CF_ACCOUNT_HASH=${CF_ACCOUNT_HASH}
      - CF_R2_ACCESS_KEY_ID=${CF_R2_ACCESS_KEY_ID}
      - CF_R2_SECRET_ACCESS_KEY=${CF_R2_SECRET_ACCESS_KEY}
      - POST_CF_R2_HASH=${POST_CF_R2_HASH}
      - POST_CF_R2_BUCKET_NAME=${POST_CF_R2_BUCKET_NAME}
      - POST_CF_R2_ACCESS_KEY_ID=${POST_CF_R2_ACCESS_KEY_ID}
      - POST_CF_R2_SECRET_ACCESS_KEY=${POST_CF_R2_SECRET_ACCESS_KEY}
      - USE_TEST_MODE=${USE_TEST_MODE:-false}
      - REDIS_URL=redis://redis:6379/0
      - REDIS_RESULT_URL=redis://redis:6379/1
      - IMEI_CHECKER_SERVICE_URL=http://imei-checker-service:${IMEI_PORT:-5002}
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy
    networks:
      - lais-network
    restart: unless-stopped
    volumes:
      - ./posts:/app

  # Chat Service (WebSocket чат)
  chat-service:
    build:
      context: ./chat
      dockerfile: Dockerfile
    container_name: lais-chat
    environment:
      - USE_POSTGRES=true
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-pass}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-lais_marketplace}
      - DOCKER_ENV=true
      - PORT=${CHAT_PORT:-4000}
      - BACKEND_HOST=${BACKEND_HOST:-0.0.0.0}
      - CF_ACCOUNT_ID=${CF_ACCOUNT_ID}
      - CF_ACCOUNT_HASH=${CF_ACCOUNT_HASH}
      - CF_API_TOKEN=${CF_API_TOKEN}
      - CF_R2_ACCESS_KEY_ID=${CF_R2_ACCESS_KEY_ID}
      - CF_R2_SECRET_ACCESS_KEY=${CF_R2_SECRET_ACCESS_KEY}
      - CF_R2_BUCKET_NAME=${CF_R2_BUCKET_NAME:-lais-chat-files}
      - VAPID_PRIVATE_KEY=hLTeehNuQqW99CbCks54TobPBcGljECpB42lPXQzNPo
      - VAPID_PUBLIC_KEY=BLlY3Ha6wMRK7ARnvHYxIjvGvzsbE8NCsjFwUeUBmxSsfEpcdJeA4wH6zJs8eS-d8o_OpRCOAgzv-zt36DZynxg
      - VAPID_SUBJECT=mailto:donbosik1@gmail.com
    ports:
      - "${CHAT_PORT:-4000}:${CHAT_PORT:-4000}"
    depends_on:
      postgres:
        condition: service_healthy
      auth-service:
        condition: service_started
      posts-service:
        condition: service_started
    networks:
      - lais-network
    restart: unless-stopped
    volumes:
      - ./chat:/app
      - ./chat/uploads:/app/uploads
      - chat-uploads:/app/uploads/chat-files

  # IMEI Checker Service v2.0 (Проверка IMEI iPhone с кешированием)
  imei-checker-service:
    build:
      context: ./iphone_cheker
      dockerfile: Dockerfile
    container_name: lais-imei-checker
    environment:
      - PORT=${IMEI_PORT:-5002}
      - BACKEND_HOST=${BACKEND_HOST:-0.0.0.0}
      - USE_TEST_MODE=${USE_TEST_MODE:-false}
      - IMEI_INFO_API_KEY=639d9e49-af3a-475d-98d1-c0b93defabf7
      - IMEI_ORG_API_KEY=D54qtbpSQaO95nqm2Yl6WaJ3kmnA0uBgICMe2lqXCfjWa2CvQuHhO6qBYFfu
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-pass}@postgres:5432/${POSTGRES_DB:-lais_marketplace}
      - IMEI_CACHE_TTL_DAYS=${IMEI_CACHE_TTL_DAYS:-7}
      - API_TIMEOUT_SECONDS=30
      - SECRET_KEY=${SECRET_KEY:-My secret key}
      - TOKEN_ALGORITHM=${TOKEN_ALGORITHM:-HS256}
    ports:
      - "${IMEI_PORT:-5001}:5002"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - lais-network
    restart: unless-stopped
    volumes:
      - ./iphone_cheker:/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5002/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Notification Service (Отправка SMS через SendBerry)
  notifications-service:
    build:
      context: ./notifications
      dockerfile: Dockerfile
    container_name: lais-notifications
    environment:
      - USE_POSTGRES=true
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-pass}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-lais_marketplace}
      - PORT=6000
      - BACKEND_HOST=${BACKEND_HOST:-0.0.0.0}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:8080}
      - SENDBERRY_API_KEY=${SENDBERRY_API_KEY}
      - SENDBERRY_API_NAME=${SENDBERRY_API_NAME}
      - SENDBERRY_API_PASSWORD=${SENDBERRY_API_PASSWORD}
      - SENDBERRY_SENDER_ID=${SENDBERRY_SENDER_ID:-SMS Inform}
      - SECRET_KEY=${SECRET_KEY:-My secret key}
      - TOKEN_ALGORITHM=${TOKEN_ALGORITHM:-HS256}
    ports:
      - "6000:6000"
    depends_on:
      postgres:
        condition: service_healthy
      auth-service:
        condition: service_started
    networks:
      - lais-network
    restart: unless-stopped
    volumes:
      - ./notifications:/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6000/api/v1/notifications/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Delivery Service (Управление доставками Omniva и DPD)
  delivery-service:
    build:
      context: ./delivery
      dockerfile: Dockerfile
    container_name: lais-delivery
    environment:
      - USE_POSTGRES=true
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-pass}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-lais_marketplace}
      - PORT=7000
      - BACKEND_HOST=${BACKEND_HOST:-0.0.0.0}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:8080}
      - NOTIFICATION_SERVICE_URL=http://notifications-service:6000
      - POSTS_SERVICE_URL=http://posts-service:3000
      - SECRET_KEY=${SECRET_KEY:-My secret key}
      - TOKEN_ALGORITHM=${TOKEN_ALGORITHM:-HS256}
      - USE_SIMULATION_MODE=${USE_SIMULATION_MODE:-true}
      - TRANSIT_TIME_HOURS=${TRANSIT_TIME_HOURS:-24}
      - PICKUP_WAIT_DAYS=${PICKUP_WAIT_DAYS:-7}
      - OMNIVA_API_KEY=${OMNIVA_API_KEY}
      - DPD_API_KEY=${DPD_API_KEY}
      - DPD_API_SECRET=${DPD_API_SECRET}
    ports:
      - "7000:7000"
    depends_on:
      postgres:
        condition: service_healthy
      notifications-service:
        condition: service_started
    networks:
      - lais-network
    restart: unless-stopped
    volumes:
      - ./delivery:/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7000/api/v1/delivery/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Nginx Reverse Proxy (внутренний, для Docker сети)
  nginx:
    image: nginx:alpine
    container_name: lais-nginx
    ports:
      - "127.0.0.1:8080:80"  # Только локальный доступ для хостового Nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro  # Для SSL сертификатов (опционально)
      - chat-uploads:/app/uploads/chat-files  # Убран :ro для доступа на чтение
    depends_on:
      - main-service
      - auth-service
      - posts-service
      - chat-service
      - imei-checker-service
      - notifications-service
      - delivery-service
    networks:
      - lais-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Main Service (Frontend / Web Interface)
  main-service:
    build:
      context: ./main
      dockerfile: Dockerfile
    container_name: lais-main
    environment:
      - PORT=${MAIN_PORT:-8080}
      - BACKEND_HOST=${BACKEND_HOST:-0.0.0.0}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:8080}
      - AUTH_SERVICE_URL=${AUTH_SERVICE_URL:-http://localhost:8000}
      - POSTS_SERVICE_URL=${POSTS_SERVICE_URL:-http://localhost:3000}
      - CHAT_SERVICE_URL=${CHAT_SERVICE_URL:-http://localhost:4000}
      - IMEI_SERVICE_URL=${IMEI_SERVICE_URL:-http://localhost:5001}
      - SECRET_KEY=${SECRET_KEY:-My secret key}
      - TOKEN_ALGORITHM=${TOKEN_ALGORITHM:-HS256}
    # НЕ публикуем порт - доступ только через nginx
    # ports:
    #   - "${MAIN_PORT:-8080}:${MAIN_PORT:-8080}"
    expose:
      - "${MAIN_PORT:-8080}"
    depends_on:
      - auth-service
      - posts-service
      - chat-service
      - imei-checker-service
    networks:
      - lais-network
    restart: unless-stopped
    volumes:
      - ./main:/app
      - /app/front  # Исключаем виртуальное окружение

networks:
  lais-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  chat-uploads:
    driver: local
