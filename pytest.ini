[pytest]
# Конфигурация pytest для проекта

# Директория с тестами
testpaths = tests

# Исключаем виртуальные окружения и служебные папки
norecursedirs = 
    .git
    __pycache__
    auth/auth
    main/front
    posts/posts
    *.egg-info
    .tox
    .nox
    .venv
    venv
    env
    site-packages
    pytest-cache-*

# Паттерн для поиска тестовых файлов
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Вывод информации
addopts = 
    -v
    --tb=short
    --strict-markers
    -ra
    --color=yes

# Маркеры
markers =
    smoke: Быстрые smoke тесты для проверки базовой работоспособности
    critical: Критические тесты, обязательные перед деплоем
    auth: Тесты для Auth сервиса
    posts: Тесты для Posts сервиса  
    chat: Тесты для Chat сервиса
    frontend: Тесты для Frontend/Main сервиса
    integration: Интеграционные тесты
    slow: Медленные тесты
    asyncio: Асинхронные тесты (pytest-asyncio)

# Игнорируемые предупреждения
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# Async режим для pytest-asyncio
asyncio_mode = auto

# Минимальная версия pytest
minversion = 7.0

# Логирование
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s (%(filename)s:%(lineno)s)
log_cli_date_format = %Y-%m-%d %H:%M:%S
