<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>{{ t.new_ad }}</title>
    <link rel="stylesheet" href="/templates/static/styles2.css?v=16">
    <script>
        // API Configuration - единый стандарт /api/v1/<service>
        const API_V1 = "/api/v1";
        const AUTH_API = `${API_V1}/auth`;
        const POSTS_API = `${API_V1}/posts`;
        console.log('🔧 API BASE:', API_V1);
    </script>
    <style>
        .post-container { max-width: 700px; margin: 40px auto; background: #fff; padding: 40px; border-radius: 24px; border: 1px solid var(--color-border); }
        @media(max-width: 768px) { .post-container { margin: 0; border-radius: 0; border: none; padding: 20px; } }
        .hidden-group { display: none; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
        
        .photo-upload-zone {
            border: 2px dashed var(--color-border);
            border-radius: 12px;
            padding: 24px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: #fafafa;
        }
        
        .photo-upload-zone:hover {
            border-color: var(--color-primary, #007AFF);
            background: #f0f8ff;
        }
        
        .photo-upload-zone.dragover {
            border-color: var(--color-primary, #007AFF);
            background: #e3f2fd;
        }
        
        .photo-gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 12px;
            margin-top: 16px;
        }
        
        .photo-item {
            position: relative;
            width: 80px;
            height: 80px;
            border-radius: 8px;
            overflow: hidden;
            background: #f0f0f0;
        }
        
        .photo-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .photo-item .delete-btn {
            position: absolute;
            top: 4px;
            right: 4px;
            background: rgba(244, 67, 54, 0.9);
            color: white;
            border: none;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            opacity: 0;
            transition: opacity 0.2s;
        }
        
        .photo-item:hover .delete-btn {
            opacity: 1;
        }
        
        .photo-count {
            font-size: 13px;
            color: var(--color-text-light);
            margin-top: 8px;
        }
        
        .photo-count.max {
            color: #f44336;
        }

        /* Progress Modal */
        .progress-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 9999;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        .progress-modal.show {
            display: flex;
        }

        .progress-box {
            background: #fff;
            border-radius: 16px;
            padding: 40px;
            max-width: 300px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        .progress-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 24px;
            color: var(--color-text);
        }

        .progress-bar-wrapper {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 12px;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #007AFF, #0051ba);
            width: 0%;
            transition: width 0.3s ease;
            border-radius: 4px;
        }

        .progress-text {
            font-size: 14px;
            color: var(--color-text-light);
            margin-bottom: 8px;
        }

        .progress-percent {
            font-size: 20px;
            font-weight: 700;
            color: #007AFF;
        }
    </style>

</head>

    <script>
        // const catSelect = document.getElementById('catSelect'); // Закомментировано - выбор категории отключен
        const iphoneBlock = document.getElementById('iphoneBlock');
        // const macBlock = document.getElementById('macBlock'); // Закомментировано
        const commonSpecs = document.getElementById('commonSpecs');
        
        // const macSeries = document.getElementById('macSeries'); // Закомментировано
        // const macAirSpecs = document.getElementById('macAirSpecs'); // Закомментировано
        // const macProSpecs = document.getElementById('macProSpecs'); // Закомментировано

        // Управление фотографиями
        const photoUploadZone = document.getElementById('photoUploadZone');
        const photoInput = document.getElementById('photoInput');
        const photoGallery = document.getElementById('photoGallery');
        const photoCount = document.getElementById('photoCount');
        let photos = [];
        const MAX_PHOTOS = 15;
        const MAX_FILE_SIZE = 5 * 1024 * 1024; // 5 МБ

        // Открытие файлового диалога при клике на зону
        photoUploadZone.addEventListener('click', () => photoInput.click());

        // Обработка выбранных файлов
        photoInput.addEventListener('change', (e) => {
            addPhotos(e.target.files);
            photoInput.value = ''; // Сброс input для возможности выбрать те же файлы
        });

        // Drag & Drop
        photoUploadZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            photoUploadZone.classList.add('dragover');
        });

        photoUploadZone.addEventListener('dragleave', () => {
            photoUploadZone.classList.remove('dragover');
        });

        photoUploadZone.addEventListener('drop', (e) => {
            e.preventDefault();
            photoUploadZone.classList.remove('dragover');
            addPhotos(e.dataTransfer.files);
        });

        function addPhotos(files) {
            const availableSlots = MAX_PHOTOS - photos.length;
            let added = 0;

            for (let file of files) {
                if (added >= availableSlots) break;
                
                // Проверка размера файла
                if (file.size > MAX_FILE_SIZE) {
                    alert(`Файл ${file.name} слишком большой (макс. 5 МБ)`);
                    continue;
                }

                // Проверка типа файла
                if (!file.type.startsWith('image/')) {
                    alert(`${file.name} не является изображением`);
                    continue;
                }

                const reader = new FileReader();
                reader.onload = (e) => {
                    photos.push({
                        file: file,
                        preview: e.target.result
                    });
                    renderPhotos();
                };
                reader.readAsDataURL(file);
                added++;
            }

            if (added < files.length && photos.length >= MAX_PHOTOS) {
                alert(`Максимум достигнут! Можно загрузить только ${MAX_PHOTOS} фотографий`);
            }
        }

        function renderPhotos() {
            photoGallery.innerHTML = '';
            photos.forEach((photo, index) => {
                const photoItem = document.createElement('div');
                photoItem.className = 'photo-item';
                photoItem.innerHTML = `
                    <img src="${photo.preview}" alt="Photo ${index + 1}">
                    <button class="delete-btn" data-index="${index}">✕</button>
                `;
                
                photoItem.querySelector('.delete-btn').addEventListener('click', () => {
                    photos.splice(index, 1);
                    renderPhotos();
                });
                
                photoGallery.appendChild(photoItem);
            });

            // Обновляем счётчик
            photoCount.textContent = `${photos.length} / ${MAX_PHOTOS} фотографий`;
            if (photos.length >= MAX_PHOTOS) {
                photoCount.classList.add('max');
                photoUploadZone.style.opacity = '0.5';
                photoUploadZone.style.pointerEvents = 'none';
            } else {
                photoCount.classList.remove('max');
                photoUploadZone.style.opacity = '1';
                photoUploadZone.style.pointerEvents = 'auto';
            }
        }

        // Автоматически показываем блок iPhone (категория закомментирована)
        iphoneBlock.style.display = 'block';
        commonSpecs.style.display = 'block';

        /* Логика выбора категорий закомментирована - сейчас только iPhone
        // Главная категория
        catSelect.addEventListener('change', (e) => {
            const val = e.target.value;
            
            // Сброс
            iphoneBlock.style.display = 'none';
            macBlock.style.display = 'none';
            commonSpecs.style.display = 'none';

            if(val === 'iphone') {
                iphoneBlock.style.display = 'block';
                commonSpecs.style.display = 'block';
            } else if(val === 'macbook') {
                macBlock.style.display = 'block';
                commonSpecs.style.display = 'block';
            } else if (val) {
                commonSpecs.style.display = 'block';
            }
        });

        // Логика MacBook (Air vs Pro)
        macSeries.addEventListener('change', (e) => {
            const val = e.target.value;
            macAirSpecs.style.display = 'none';
            macProSpecs.style.display = 'none';

            if(val === 'air') {
                macAirSpecs.style.display = 'block';
            } else if(val === 'pro') {
                macProSpecs.style.display = 'block';
            }
        });
        */

        // Обработка отправки формы на Posts API
        document.getElementById('publishBtn').addEventListener('click', async (e) => {
            e.preventDefault();
            
            // Получаем элементы
            const publishBtn = document.getElementById('publishBtn');
            const progressModal = document.getElementById('progressModal');
            const progressBar = document.getElementById('progressBar');
            const progressText = document.getElementById('progressText');
            const progressPercent = document.getElementById('progressPercent');
            
            // Показываем progress modal
            progressModal.classList.add('show');
            publishBtn.disabled = true;
            
            try {
                // ===== ШАГ 1: ВАЛИДАЦИЯ ВСЕХ ПОЛЕЙ ПЕРЕД ЗАГРУЗКОЙ ФОТО =====
                updateProgress(progressBar, progressText, progressPercent, 5, '{{ t.checking_data }}');
                
                // Проверка фотографий
                if (photos.length === 0) {
                    alert('Необходимо загрузить хотя бы одну фотографию');
                    progressModal.classList.remove('show');
                    publishBtn.disabled = false;
                    return;
                }
                
                // IMEI (обязательное поле)
                const imeiInput = document.getElementById('imei-input');
                if (!imeiInput || !imeiInput.value || imeiInput.value.length !== 15 || !/^\d{15}$/.test(imeiInput.value)) {
                    alert('{{ t.imei_label }} - обязательное поле (15 цифр)');
                    progressModal.classList.remove('show');
                    publishBtn.disabled = false;
                    return;
                }
                
                // Батарея (обязательное поле)
                const batteryInput = document.getElementById('battery-input');
                if (!batteryInput || !batteryInput.value) {
                    alert('{{ t.battery_condition }} - обязательное поле');
                    progressModal.classList.remove('show');
                    publishBtn.disabled = false;
                    return;
                }
                
                // Цена (обязательное поле)
                const priceInput = document.getElementById('price-input');
                if (!priceInput || !priceInput.value) {
                    alert('{{ t.price_label }} - обязательное поле');
                    progressModal.classList.remove('show');
                    publishBtn.disabled = false;
                    return;
                }
                
                // Состояние (обязательное поле)
                const conditionInput = document.getElementById('condition-input');
                if (!conditionInput || !conditionInput.value) {
                    alert('{{ t.device_condition }} - обязательное поле');
                    progressModal.classList.remove('show');
                    publishBtn.disabled = false;
                    return;
                }
                
                // ===== ШАГ 2: ПРОВЕРКА АВТОРИЗАЦИИ И REFRESH ТОКЕНА =====
                updateProgress(progressBar, progressText, progressPercent, 10, '{{ t.checking_auth }}');
                
                const authCheck = await fetch(`${AUTH_API}/me`, {
                    method: 'GET',
                    credentials: 'include'
                });
                
                if (authCheck.status === 401) {
                    // Пытаемся обновить токен
                    const refreshResponse = await fetch(`${AUTH_API}/refresh`, {
                        method: 'GET',
                        credentials: 'include'
                    });
                    
                    if (!refreshResponse.ok) {
                        alert('Требуется авторизация. Пожалуйста, войдите в аккаунт.');
                        progressModal.classList.remove('show');
                        publishBtn.disabled = false;
                        window.location.href = '/';
                        return;
                    }
                    
                    // Токен обновлен, повторная проверка
                    const retryAuth = await fetch(`${AUTH_API}/me`, {
                        method: 'GET',
                        credentials: 'include'
                    });
                    
                    if (!retryAuth.ok) {
                        alert('Ошибка авторизации');
                        progressModal.classList.remove('show');
                        publishBtn.disabled = false;
                        return;
                    }
                }
                
                // ===== ШАГ 3: ЗАГРУЗКА ФОТОГРАФИЙ =====
                updateProgress(progressBar, progressText, progressPercent, 20, '{{ t.uploading_photos }}');
                
                let imageUrls = [];
                if (photos.length > 0) {
                    console.log(`Загружаем ${photos.length} фотографий в Cloudflare...`);
                    imageUrls = await uploadPhotosToCloudflare(photos);
                    
                    if (imageUrls.length === 0) {
                        alert('Не удалось загрузить фотографии');
                        progressModal.classList.remove('show');
                        publishBtn.disabled = false;
                        return;
                    }
                    console.log('Фотографии загружены:', imageUrls);
                }

                // Обновляем прогресс: 50% - фото загружены
                updateProgress(progressBar, progressText, progressPercent, 50, '{{ t.preparing_data }}');

                // ===== ШАГ 4: ПОДГОТОВКА ДАННЫХ ФОРМЫ =====
                const formData = new FormData();
                
                // Все поля уже проверены выше, просто добавляем
                formData.append('imei', imeiInput.value);
                formData.append('batery', batteryInput.value);
                formData.append('price', priceInput.value);
                formData.append('condition', conditionInput.value);
                
                // Описание (необязательное)
                const description = document.getElementById('description').value;
                if (description) {
                    formData.append('description', description);
                }
                
                // Комплектация (checkboxes)
                formData.append('has_original_box', document.querySelector('input[name="has_original_box"]').checked);
                formData.append('has_charger', document.querySelector('input[name="has_charger"]').checked);
                formData.append('has_cable', document.querySelector('input[name="has_cable"]').checked);
                formData.append('has_receipt', document.querySelector('input[name="has_receipt"]').checked);
                formData.append('has_warranty', document.querySelector('input[name="has_warranty"]').checked);
                
                // Добавляем URL фотографий вместо самих файлов
                if (imageUrls.length > 0) {
                    formData.append('images_url', imageUrls.join(','));
                }
                
                // ===== ШАГ 5: ОТПРАВКА ДАННЫХ НА СЕРВЕР =====
                updateProgress(progressBar, progressText, progressPercent, 80, '{{ t.sending_data }}');
                
                console.log('Отправляем данные на Posts API...');
                const response = await fetch(`${POSTS_API}/iphone`, {
                    method: 'POST',
                    body: formData,
                    credentials: 'include' // Отправляем cookies с JWT токеном
                });
                
                if (response.ok) {
                    const data = await response.json();
                    // Обновляем прогресс: 100% - успешно
                    updateProgress(progressBar, progressText, progressPercent, 100, '{{ t.upload_complete }}');
                    
                    setTimeout(() => {
                        alert(`Пост опубликован! ID: ${data.id}`);
                        // Редирект на страницу продукта
                        window.location.href = `/product?id=${data.id}`;
                    }, 500);
                } else {
                    const error = await response.json();
                    console.log(error.detail)
                    progressModal.classList.remove('show');
                    alert(`Ошибка: ${error.detail || 'Не удалось опубликовать пост'}`);
                }
            } catch (error) {
                console.log(error)
                console.error('Ошибка при отправке:', error);
                progressModal.classList.remove('show');
                alert('Ошибка подключения к серверу');
            } finally {
                publishBtn.disabled = false;
                progressModal.classList.remove('show');
            }
        });

        // Helper функция для обновления прогресса
        function updateProgress(progressBar, progressText, progressPercent, percent, text) {
            progressBar.style.width = percent + '%';
            progressPercent.textContent = percent + '%';
            progressText.textContent = text;
        }

        /**
         * Загружает фотографии напрямую в Cloudflare R2
         * @param {Array} photosArray - Массив объектов с file и preview
         * @returns {Promise<Array>} Массив URL загруженных фотографий
         */
        async function uploadPhotosToCloudflare(photosArray) {
            const uploadedUrls = [];

            try {
                for (let i = 0; i < photosArray.length; i++) {
                    const photo = photosArray[i];
                    
                    // Обновляем прогресс загрузки фото
                    const photoProgress = 20 + Math.floor((i / photosArray.length) * 30);
                    updateProgress(
                        progressBar, 
                        progressText, 
                        progressPercent, 
                        photoProgress, 
                        `{{ t.uploading_photos }} ${i + 1}/${photosArray.length}...`
                    );
                    
                    try {
                        console.log(`Загружаем фото ${i + 1}/${photosArray.length} в R2...`);
                        console.log(`Тип файла: ${photo.file.type}, Размер: ${(photo.file.size / 1024).toFixed(2)} KB`);

                        // Создаем FormData для загрузки файла
                        const formData = new FormData();
                        formData.append('file', photo.file);

                        // Загружаем файл напрямую в R2 через наш новый endpoint
                        const uploadResponse = await fetch(`${POSTS_API}/upload-image`, {
                            method: 'POST',
                            body: formData,
                            credentials: 'include'
                        });

                        console.log(`Ответ сервера: ${uploadResponse.status} ${uploadResponse.statusText}`);

                        if (!uploadResponse.ok) {
                            const error = await uploadResponse.json();
                            console.error(`Ошибка загрузки фото ${i + 1}:`, error);
                            throw new Error(error.detail || 'Upload failed');
                        }

                        // Получаем публичный URL из ответа
                        const uploadResult = await uploadResponse.json();
                        const publicUrl = uploadResult.public_url;
                        
                        console.log(`✓ Публичный URL: ${publicUrl}`);
                        
                        uploadedUrls.push(publicUrl);
                        console.log(`Фото ${i + 1} успешно загружена: ${publicUrl}`);

                    } catch (error) {
                        console.error(`Ошибка при загрузке фото ${i + 1}:`, error);
                        // Продолжаем загрузку остальных фото даже если одна не загрузилась
                    }
                }

                console.log(`Загружено ${uploadedUrls.length} из ${photosArray.length} фото`);
                return uploadedUrls;

            } catch (error) {
                console.error('Ошибка при загрузке фотографий в R2:', error);
                return [];
            }
        }
    </script>
